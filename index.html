<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajengwahys Academy Banner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --navy-deep: #0B132B;
            --navy-light: #1C2541;
            --accent-yellow: #F4D03F;
            --text-white: #FFFFFF;
            --transition-smooth: 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            /* Ganti background putih halaman jadi gelap agar banner mengambang menonjol */
            background-color: #1a1a1a; 
        }

        /* Container utama banner - Mengambang, Melengkung, Persegi Panjang */
        .banner-container {
            position: relative;
            width: 95%; /* Jarak sisi di desktop */
            max-width: 1200px;
            margin: 30px auto; /* Posisi tengah dengan jarak atas-bawah */
            height: 400px; /* Tinggi Desktop */
            overflow: hidden;
            background-color: var(--navy-deep);
            border-radius: 24px; /* Efek rounded */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); /* Bayangan lembut */
            display: flex;
            align-items: center;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform var(--transition-smooth);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Gradien fokus di kiri untuk teks */
            background: linear-gradient(90deg, rgba(11, 19, 43, 0.95) 0%, rgba(11, 19, 43, 0.8) 50%, rgba(11, 19, 43, 0.2) 100%);
            z-index: 1;
        }

        .banner-content {
            position: absolute;
            top: 50%;
            left: 6%; /* Jarak teks dari kiri */
            transform: translateY(-50%);
            z-index: 2;
            color: var(--text-white);
            max-width: 600px;
            padding: 0;
            text-align: left; /* Teks rata kiri */
        }

        .badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
            backdrop-filter: blur(4px);
        }

        .banner-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .banner-content p {
            font-size: 1.05rem;
            font-weight: 400;
            margin: 0 0 25px 0;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
        }

        .banner-content p strong {
            color: var(--text-white);
            font-weight: 600;
        }

        .price-section {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-normal {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .price-promo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-yellow);
        }

        .stats-row {
            display: flex;
            gap: 18px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .stats-row span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 30px;
            background-color: var(--text-white);
            color: var(--navy-deep);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .cta-button:hover {
            background-color: var(--accent-yellow);
            color: var(--navy-deep);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(244, 208, 63, 0.4);
        }

        /* Navigasi Manual (Panah) */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-white);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background-color 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .slider-arrow:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        /* Indikator Slider (Dots) */
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 9px;
            height: 9px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--text-white);
            transform: scale(1.3);
        }

        /* --- MOBILE RESPONSIVE EXTREME --- */
        @media (max-width: 768px) {
            .banner-container {
                width: 92%; /* Jarak sisi di mobile */
                height: 190px; /* TINGGI DIPIPIHKAN LAGI AGAR BENAR-BENAR PERSEGI PANJANG PIPIS */
                border-radius: 16px;
                margin: 20px auto;
            }

            .overlay {
                /* Gradien gelap tetap difokuskan di kiri */
                background: linear-gradient(90deg, rgba(11, 19, 43, 0.95) 0%, rgba(11, 19, 43, 0.8) 60%, rgba(11, 19, 43, 0.2) 100%);
            }

            .banner-content {
                left: 5%; /* Teks rapat kiri */
                width: 80%; /* Mencegah teks terlalu mepet ke kanan */
                max-width: none;
                padding: 0;
            }

            .badge {
                font-size: 0.5rem; /* DIPERKECIL LAGI */
                padding: 3px 8px;
                margin-bottom: 5px;
            }

            .banner-content h1 {
                font-size: 1.1rem; /* DIPERKECIL DRASTIS */
                margin-bottom: 4px;
            }

            .banner-content p {
                font-size: 0.7rem; /* DIPERKECIL LAGI */
                margin-bottom: 8px;
                line-height: 1.3;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .price-section {
                justify-content: flex-start; /* Rata kiri */
                margin-bottom: 8px;
                gap: 6px;
            }

            .price-promo {
                font-size: 1rem; /* DIPERKECIL */
            }

            .price-normal {
                font-size: 0.7rem;
            }

            .stats-row {
                justify-content: flex-start; /* Rata kiri */
                margin-bottom: 8px;
                font-size: 0.65rem; /* DIPERKECIL */
                gap: 10px;
            }

            .cta-button {
                padding: 6px 14px; /* DIPERKECIL Button lebih kecil */
                font-size: 0.7rem; /* Teks button kecil */
                border-radius: 6px;
            }

            /* Sembunyikan panah manual di mobile agar tidak mengganggu pandangan di layar sempit */
            .slider-arrow {
                display: none;
            }

            .slider-dots {
                bottom: 8px;
                gap: 6px;
            }

            .dot {
                width: 5px;
                height: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide">
                <img src="https://image2url.com/r2/default/images/1775548782917-69045535-b4d9-4045-9a34-f5f4a4be7890.png" alt="Team Collaboration">
            </div>
            <div class="slide">
                <img src="https://image2url.com/r2/default/images/1775549101591-fca06ca1-375e-4a80-9ca7-498bc3a52cbb.png" alt="Working Remotely">
            </div>
        </div>

        <div class="overlay"></div>

        <div class="banner-content" id="bannerContent">
            </div>

        <button class="slider-arrow arrow-left" id="prevBtn" aria-label="Slide sebelumnya">&#10094;</button>
        <button class="slider-arrow arrow-right" id="nextBtn" aria-label="Slide berikutnya">&#10095;</button>

        <div class="slider-dots">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
        </div>
    </div>

    <script>
        const slideData = [
            {
                badge: "AJENGWAHYS ACADEMY",
                title: "Don't Just Read.<br>Start Doing.",
                desc: "Jalan pintas dari pengalamanku 6 tahun. Bukan sekadar Ebook, tapi <strong>Ekosistem Belajar</strong> biar kamu nggak bingung sendirian.",
                extraHtml: `
                    <div class="stats-row">
                        <span>4.9/5 Rating</span>
                        <span>•</span>
                        <span>1000+ Terjual</span>
                    </div>
                `,
                btnText: "Mulai Sekarang",
                btnLink: "https://lynk.id/ajengwahys/7nw892ndj2gk" 
            },
            {
                badge: "LIFETIME ACCESS",
                title: "Becoming Remote Worker",
                desc: "Ebook update otomatis di Notion, akses <strong>Circle Community</strong> 24/7, dan Webinar Rutin (Mentoring & Bedah CV).",
                extraHtml: `
                    <div class="price-section">
                        <span class="price-normal">Rp 399.000</span>
                        <span class="price-promo">Rp 129.900</span>
                    </div>
                `,
                btnText: "Ambil Promo Terbatas",
                btnLink: "https://lynk.id/ajengwahys/7nw892ndj2gk" 
            }
        ];

        const sliderWrapper = document.getElementById('sliderWrapper');
        const bannerContent = document.getElementById('bannerContent');
        const dots = document.querySelectorAll('.dot');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let currentIndex = 0;
        const totalSlides = slideData.length;
        let sliderInterval;
        const AUTO_SLIDE_DELAY = 5000; // 5 detik

        // Fungsi untuk merender teks di atas banner
        function renderContent(index) {
            const data = slideData[index];
            
            bannerContent.style.opacity = '0';
            bannerContent.style.transform = 'translateY(-45%)';
            bannerContent.style.transition = 'all 0.4s ease';
            
            setTimeout(() => {
                bannerContent.innerHTML = `
                    <span class="badge">${data.badge}</span>
                    <h1>${data.title}</h1>
                    <p>${data.desc}</p>
                    ${data.extraHtml}
                    <a href="${data.btnLink}" target="_blank" rel="noopener noreferrer" class="cta-button">${data.btnText}</a>
                `;
                bannerContent.style.opacity = '1';
                bannerContent.style.transform = 'translateY(-50%)';
            }, 400); 
        }

        // Fungsi utama untuk berpindah slide
        function goToSlide(index) {
            currentIndex = index;
            // Geser gambar
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // Ganti teks
            renderContent(currentIndex);

            // Update dot aktif
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        // Fungsi navigasi manual
        function prevSlide() {
            let index = (currentIndex - 1 + totalSlides) % totalSlides;
            handleManualChange(index);
        }

        function nextSlide() {
            let index = (currentIndex + 1) % totalSlides;
            handleManualChange(index);
        }

        // Mengatur jeda otomatis saat ada interaksi manual
        function handleManualChange(index) {
            if (index !== currentIndex) {
                goToSlide(index);
                stopSlider();
                startSlider(); // Mulai ulang timer agar jeda setelah klik manual
            }
        }

        // Fungsi kontrol otomatis
        function startSlider() {
            sliderInterval = setInterval(() => {
                let nextIndex = (currentIndex + 1) % totalSlides;
                goToSlide(nextIndex);
            }, AUTO_SLIDE_DELAY); 
        }

        function stopSlider() {
            clearInterval(sliderInterval);
        }

        // --- EVENT LISTENERS ---

        // Navigasi Manual (Panah)
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);

        // Navigasi Manual (Dots)
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));
                handleManualChange(index);
            });
        });

        // Hentikan slider saat hover (opsional, nonaktifkan jika mengganggu)
        // const container = document.querySelector('.banner-container');
        // container.addEventListener('mouseenter', stopSlider);
        // container.addEventListener('mouseleave', startSlider);

        // Render konten pertama & mulai slider saat halaman dimuat
        renderContent(0);
        startSlider();
    </script>

</body>
</html>
