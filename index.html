<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajengwahys Academy Banner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --navy-deep: #0B132B;
            --accent-yellow: #F4D03F;
            --text-white: #FFFFFF;
            --transition-smooth: 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa; /* Warna dasar halaman website kamu */
        }

        /* Container utama banner - FULL TRANSPARAN, TANPA ROUNDED */
        .banner-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            height: 350px;
            overflow: hidden;
            background-color: transparent; /* TRANSPARAN total */
            border-radius: 0; /* TANPA LENGKUNGAN */
            display: flex;
            align-items: center;
            /* Mencegah teks ter-highlight saat di-swipe/drag */
            user-select: none; 
            -webkit-user-select: none;
            /* Mengoptimalkan gesture di mobile */
            touch-action: pan-y; 
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform var(--transition-smooth);
            cursor: grab; /* Kursor tangan untuk indikasi bisa ditarik */
        }

        .slider-wrapper:active {
            cursor: grabbing;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            pointer-events: none; /* Mencegah gambar ikut terseret saat swipe */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Gradien gelap HANYA di kiri, kanan transparan agar gambar terlihat jelas */
            background: linear-gradient(90deg, rgba(11, 19, 43, 0.9) 0%, rgba(11, 19, 43, 0.6) 30%, rgba(11, 19, 43, 0) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .banner-content {
            position: absolute;
            top: 50%;
            left: 3%;
            transform: translateY(-50%);
            z-index: 2;
            color: var(--text-white);
            max-width: 400px;
            padding: 0;
            text-align: left;
            pointer-events: auto;
        }

        .badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            backdrop-filter: blur(4px);
        }

        .banner-content h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .banner-content p {
            font-size: 0.8rem;
            font-weight: 400;
            margin: 0 0 15px 0;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
        }

        .banner-content p strong {
            color: var(--text-white);
            font-weight: 600;
        }

        .price-section {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-normal {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
        }

        .price-promo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-yellow);
        }

        .stats-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .stats-row span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            background-color: var(--text-white);
            color: var(--navy-deep);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            /* Mencegah klik tombol malah memicu swipe */
            position: relative;
            z-index: 10;
        }

        .cta-button:hover {
            background-color: var(--accent-yellow);
            color: var(--navy-deep);
            transform: translateY(-2px);
        }

        /* Indikator Slider (Dots) */
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--text-white);
            transform: scale(1.2);
        }

        /* --- MOBILE RESPONSIVE EXTREME --- */
        @media (max-width: 768px) {
            .banner-container {
                width: 100%;
                height: 180px;
            }

            .overlay {
                background: linear-gradient(90deg, rgba(11, 19, 43, 0.95) 0%, rgba(11, 19, 43, 0.8) 50%, rgba(11, 19, 43, 0) 100%);
            }

            .banner-content {
                left: 3%;
                width: 70%;
                max-width: none;
                padding: 0;
            }

            .badge {
                font-size: 0.45rem;
                padding: 2px 7px;
                margin-bottom: 4px;
            }

            .banner-content h1 {
                font-size: 0.95rem;
                margin-bottom: 3px;
            }

            .banner-content p {
                font-size: 0.6rem;
                margin-bottom: 6px;
                line-height: 1.2;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .price-section {
                justify-content: flex-start;
                margin-bottom: 6px;
                gap: 5px;
            }

            .price-promo {
                font-size: 0.9rem;
            }

            .price-normal {
                font-size: 0.65rem;
            }

            .stats-row {
                justify-content: flex-start;
                margin-bottom: 6px;
                font-size: 0.55rem;
                gap: 8px;
            }

            .cta-button {
                padding: 5px 12px;
                font-size: 0.65rem;
                border-radius: 4px;
            }

            .slider-dots {
                bottom: 6px;
                gap: 5px;
            }

            .dot {
                width: 4px;
                height: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-container" id="bannerContainer">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide">
                <img src="https://image2url.com/r2/default/images/1775548782917-69045535-b4d9-4045-9a34-f5f4a4be7890.png" alt="Team Collaboration">
            </div>
            <div class="slide">
                <img src="https://image2url.com/r2/default/images/1775549101591-fca06ca1-375e-4a80-9ca7-498bc3a52cbb.png" alt="Working Remotely">
            </div>
        </div>

        <div class="overlay"></div>

        <div class="banner-content" id="bannerContent">
            </div>

        <div class="slider-dots">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
        </div>
    </div>

    <script>
        const slideData = [
            {
                badge: "AJENGWAHYS ACADEMY",
                title: "Don't Just Read.<br>Start Doing.",
                desc: "Jalan pintas dari pengalamanku 6 tahun. Bukan sekadar Ebook, tapi <strong>Ekosistem Belajar</strong>.",
                extraHtml: `
                    <div class="stats-row">
                        <span>4.9/5 Rating</span>
                        <span>•</span>
                        <span>1000+ Terjual</span>
                    </div>
                `,
                btnText: "Mulai Sekarang",
                btnLink: "https://lynk.id/ajengwahys/7nw892ndj2gk" 
            },
            {
                badge: "LIFETIME ACCESS",
                title: "Becoming Remote Worker",
                desc: "Ebook update di Notion, akses <strong>Circle Community</strong>, dan Webinar Rutin.",
                extraHtml: `
                    <div class="price-section">
                        <span class="price-normal">Rp 399.000</span>
                        <span class="price-promo">Rp 129.900</span>
                    </div>
                `,
                btnText: "Ambil Promo Terbatas",
                btnLink: "https://lynk.id/ajengwahys/7nw892ndj2gk" 
            }
        ];

        const bannerContainer = document.getElementById('bannerContainer');
        const sliderWrapper = document.getElementById('sliderWrapper');
        const bannerContent = document.getElementById('bannerContent');
        const dots = document.querySelectorAll('.dot');
        
        let currentIndex = 0;
        const totalSlides = slideData.length;
        let sliderInterval;
        const AUTO_SLIDE_DELAY = 5000;

        // Variabel untuk fitur swipe (Touch & Mouse)
        let startX = 0;
        let endX = 0;
        let isDragging = false;

        function renderContent(index) {
            const data = slideData[index];
            
            bannerContent.style.opacity = '0';
            bannerContent.style.transition = 'opacity 0.4s ease';
            
            setTimeout(() => {
                bannerContent.innerHTML = `
                    <span class="badge">${data.badge}</span>
                    <h1>${data.title}</h1>
                    <p>${data.desc}</p>
                    ${data.extraHtml}
                    <a href="${data.btnLink}" target="_blank" rel="noopener noreferrer" class="cta-button">${data.btnText}</a>
                `;
                bannerContent.style.opacity = '1';
            }, 400); 
        }

        function goToSlide(index) {
            currentIndex = index;
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            renderContent(currentIndex);

            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        function handleManualChange(index) {
            if (index !== currentIndex) {
                goToSlide(index);
                stopSlider();
                startSlider(); 
            }
        }

        function startSlider() {
            sliderInterval = setInterval(() => {
                let nextIndex = (currentIndex + 1) % totalSlides;
                goToSlide(nextIndex);
            }, AUTO_SLIDE_DELAY); 
        }

        function stopSlider() {
            clearInterval(sliderInterval);
        }

        // --- FITUR SWIPE (TOUCH) UNTUK MOBILE ---
        bannerContainer.addEventListener('touchstart', (e) => {
            startX = e.changedTouches[0].screenX;
        }, { passive: true });

        bannerContainer.addEventListener('touchend', (e) => {
            endX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        // --- FITUR SWIPE (MOUSE/DRAG) UNTUK DESKTOP ---
        bannerContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.screenX;
        });

        bannerContainer.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            endX = e.screenX;
            isDragging = false;
            handleSwipe();
        });

        bannerContainer.addEventListener('mouseleave', () => {
            isDragging = false; // Batalkan drag jika kursor keluar dari area banner
        });

        // Logika eksekusi arah swipe
        function handleSwipe() {
            const threshold = 50; // Jarak minimal gesekan agar dihitung sebagai swipe (dalam pixel)
            
            if (startX - endX > threshold) {
                // Geser ke kiri -> Slide selanjutnya
                let nextIndex = (currentIndex + 1) % totalSlides;
                handleManualChange(nextIndex);
            } else if (endX - startX > threshold) {
                // Geser ke kanan -> Slide sebelumnya
                let prevIndex = (currentIndex - 1 + totalSlides) % totalSlides;
                handleManualChange(prevIndex);
            }
        }

        // --- NAVIGASI DOTS ---
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));
                handleManualChange(index);
            });
        });

        renderContent(0);
        startSlider();
    </script>

</body>
</html>
